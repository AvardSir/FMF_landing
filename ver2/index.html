<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMF Landing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="scroll-container">
        <section class="screen-section">
            <img src="images/1 main.png" alt="Screen 1" class="screen-image">
        </section>

        <section class="screen-section">
            <img src="images/2.png" alt="Screen 2" class="screen-image" data-animation="images/2 animation.png">
        </section>

        <section class="screen-section">
            <img src="images/3.png" alt="Screen 3" class="screen-image" data-animation="images/3 animation.png">
        </section>

        <section class="screen-section">
            <img src="images/4.png" alt="Screen 4" class="screen-image" data-animation="images/4 animation 2.png">
        </section>

        <section class="screen-section">
            <img src="images/5.png" alt="Screen 5" class="screen-image" data-animation="images/5 animation.png">
        </section>

        <section class="screen-section">
            <img src="images/6.jpg" alt="Screen 6" class="screen-image">
        </section>

        <section class="screen-section">
            <img src="images/7.png" alt="Screen 7" class="screen-image" data-animation="images/7 animation.png">
        </section>

        <section class="screen-section">
            <img src="images/8.png" alt="Screen 8" class="screen-image" data-animation="images/8 animation.png">
        </section>

        <section class="screen-section">
            <img src="images/9.png" alt="Screen 9" class="screen-image">
        </section>

        <section class="screen-section">
            <img src="images/10.png" alt="Screen 10" class="screen-image" data-animation="images/10 animation.png">
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
